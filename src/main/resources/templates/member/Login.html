<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="/css/style.css">


  <style>
    a,
    button,
    input,
    select,
    h1,
    h2,
    h3,
    h4,
    h5,
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        text-decoration: none;
        background: none;

        -webkit-font-smoothing: antialiased;
    }

    menu, ol, ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }
  </style>
  <title>Document</title>
</head>
<body>
<div class="login-02">
  <div class="header">
    <div class="frame-23">
      <div class="frame-34">
        <div class="frame-342">
          <div class="petopia">
              <span>
                <span class="petopia-span"></span>
                <span class="petopia-span2">PETOPIA</span>
              </span>
          </div>
        </div>
      </div>
      <div class="frame-45">
        <button class="iconly-regular-outline-home">
          <img onclick="" class="home" src="home0.svg" alt="HomeButton"/>
        </button>
      </div>
    </div>
  </div>
  <div class="body-1">
    <div class="contents">
      <div class="frame-452">
        <div class="petopia2">PETOPIA</div>
      </div>
      <div class="frame-453">
        <div class="div">반려인, 반려견 건강 프로젝트</div>
      </div>
      <div class="frame-454">
        <div class="div2">모두 함께 건강한 세상!</div>
      </div>
    </div>
  </div>
  <div class="body-2">
    <div class="contents2">
      <div class="insert-member-button">
        <button class="div3">회원가입</button>
      </div>
      <div class="frame-46">
        <div class="div4">아직 회원이 아니세요?</div>
      </div>
      <div class="find-password">
        <button class="div5">패스워드 찾기</button>
      </div>
      <div class="find-id">
        <button class="div5">아이디 찾기</button>
      </div>
      <div class="still-login">
        <div class="div6">
          <input type="checkbox" class="rectangle-20"/>
        </div>
        <div class="div7">로그인 상태 유지</div>
      </div>
      <div class="login-button">
        <button onclick="" class="div8">로그인</button>
      </div>
      <div class="input-password">
        <div class="div5">비밀번호</div>
      </div>
      <div class="input-id" onclick="showInput()">>
        <div class="div5">아이디 또는 이메일</div>
      </div>
      <div class="login">
        <div class="div2">회원 로그인</div>
      </div>
    </div>
  </div>
  <div class="body-3">
    <div class="contents3">
      <div class="google-login">
        <button class="google-login2">
          <img class="google-login-api" src="google-login-api0.png" alt="googleLogin"/>
        </button>
      </div>
      <div class="naver-login">
        <button class="naver-login2">
          <img class="naver-login-api" src="naver-login-api0.png" alt="naverLogin"/>
        </button>
      </div>
      <div class="kakao-login">
        <div class="group-45">
          <button class="kakao-login2">
            <img class="kokoa-login-api" src="kokoa-login-api0.png" alt="kakaoLogin"/>
          </button>
        </div>
      </div>
      <div class="sns-login">
        <div class="sns">SNS 계정 로그인</div>
      </div>
      <div class="line-2"></div>
      <div class="line-1"></div>
    </div>
  </div>
</div>

</body>
</html>
